workflows:
  ios-app:
    name: iOS App
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: 16
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Add and sync Capacitor iOS
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - ios/App/build/*.xcarchive
      - ios/App/build/*.ipa
  android-app:
    name: Android App
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 17
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Add and sync Capacitor Android
        script: |
          npx cap add android || true
          npx cap sync android
      - name: Build Android
        script: cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
      - android/app/build/outputs/**/*.aab